model:
  base_model: sd15

data:
  dataset_path: ./examples/fern/dataset_512
  resolution: 512
  cache_latents: false

lora:
  rank: 8
  alpha: 8

training:
  learning_rate: 1e-4
  batch_size: 1
  max_train_steps: 1000
  mixed_precision: fp16
  seed: 42
  save_every_n_steps: 100
  sample_every_n_steps: 250

validation:
  assert_effective_training: false
  min_effective_steps: 1000
  min_lora_delta_l2: 1e-6
  max_loss_ratio: 1.2
  require_loss_drop: false

output:
  output_dir: ./runs/agent_1000
