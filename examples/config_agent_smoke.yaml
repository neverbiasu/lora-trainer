model:
  base_model: sd15

data:
  dataset_path: ./examples/fern/dataset_512
  resolution: 512
  cache_latents: false

lora:
  rank: 8
  alpha: 8

training:
  learning_rate: 1e-4
  batch_size: 1
  max_train_steps: 1
  mixed_precision: fp32
  seed: 42
  save_every_n_steps: 1

output:
  output_dir: ./runs/agent_smoke
