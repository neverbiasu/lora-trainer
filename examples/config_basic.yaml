# Basic configuration example
config_version: "0.1.0"

model:
  base_model: sd15         # SD1.5 model

data:
  dataset_path: ./my_data  # dataset path
  resolution: 512          # training resolution
  cache_latents: auto      # auto-decide whether to cache latents
  enable_bucketing: true   # enable aspect-ratio bucketing

lora:
  rank: 32                 # LoRA rank
  alpha: 32                # LoRA alpha (typically equals rank)

training:
  preset: balanced         # use balanced preset
  learning_rate: 1e-4      # learning rate
  lr_scheduler: cosine     # LR scheduler
  batch_size: 4            # batch size
  gradient_accumulation: 1 # gradient accumulation steps
  max_train_steps: 1500    # max training steps (auto = auto-calculate)
  
  mixed_precision: fp16    # mixed precision
  enable_xformers: true    # enable xformers optimization
  
  save_every_n_steps: 500  # checkpoint save frequency
  sample_every_n_steps: 250 # sample generation frequency
  
  seed: 42                 # random seed

output:
  output_dir: ./output     # output directory
