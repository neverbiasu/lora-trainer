# High-quality training configuration example (quality preset)
config_version: "0.1.0"

model:
  base_model: sd15

data:
  dataset_path: ./my_data
  resolution: 512
  cache_latents: auto
  enable_bucketing: true

lora:
  rank: 64                 # larger rank for stronger expressiveness
  alpha: 64

training:
  preset: quality          # use quality preset
  learning_rate: 5e-5      # more conservative learning rate
  lr_scheduler: cosine
  lr_warmup_steps: 200     # longer warmup
  
  batch_size: 2            # smaller batch for stability
  gradient_accumulation: 2 # effective batch = 4
  max_train_steps: 3000    # more training steps
  
  mixed_precision: fp16
  enable_xformers: true
  
  save_every_n_steps: 500
  sample_every_n_steps: 250
  num_sample_images: 8     # more sample images for validation
  
  seed: 42

output:
  output_dir: ./output
