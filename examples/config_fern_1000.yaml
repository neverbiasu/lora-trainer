model:
  base_model: sd15

data:
  dataset_path: ./examples/fern/dataset_512
  resolution: 512
  cache_latents: false

lora:
  rank: 8
  alpha: 8

training:
  # Increased LR for faster adaptation (Standard SD1.5 LoRA Unet LR is 1e-4)
  learning_rate: 1e-4
  text_encoder_lr: 5e-5
  lr_scheduler: constant_with_warmup
  lr_warmup_steps: 100
  batch_size: 1
  # Run longer as requested
  max_train_steps: 1000
  preset: balanced
  mixed_precision: fp32
  enable_xformers: false
  seed: 42
  # Produce intermediate samples every N steps so you can inspect progress
  sample_every_n_steps: 100
  sample_num_images: 4

output:
  output_dir: ./runs/test_fern_1000
