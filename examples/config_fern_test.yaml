model:
  base_model: sd15

data:
  dataset_path: ./examples/fern/dataset_512
  resolution: 512
  cache_latents: false

lora:
  rank: 8
  alpha: 8

training:
  learning_rate: 1e-5
  batch_size: 2
  max_train_steps: 150
  preset: balanced
  mixed_precision: fp32
  seed: 42

output:
  output_dir: ./runs/test_fern
